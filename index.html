<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duolingo-Style Learning Interface</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <div id="welcome-screen">
        <h1>Welcome to Python Learning!</h1>
        <div id="auth">
            <button id="login">Login</button>
            <button id="register">Register</button>
        </div>
    </div>
    <div id="course-map">
        <h2>Course Map</h2>
        <div class="lesson locked" data-lesson="int">Lesson 1: Integers</div>
        <div class="lesson locked" data-lesson="float">Lesson 2: Floats</div>
        <div class="lesson locked" data-lesson="str">Lesson 3: Strings</div>
        <div class="lesson locked" data-lesson="bool">Lesson 4: Booleans</div>
        <div class="lesson locked" data-lesson="list">Lesson 5: Lists</div>
    </div>
    <div id="xp-tracking">
        <h2>XP System</h2>
        <p>Current XP: <span id="current-xp">0</span></p>
        <p>Current Streak: <span id="current-streak">0</span> days</p>
    </div>
    <div id="lesson-slides">
        <h2>Lesson Slides</h2>
        <div id="slides-content"></div>
        <button id="next-slide">Next Slide</button>
    </div>
    <div id="result-screen">
        <h2>Results</h2>
        <p>Stars: <span id="stars-earned">0</span></p>
        <p>XP Earned: <span id="xp-earned">0</span></p>
    </div>

    <script>
        // Simulate real-time progress syncing to JSONBin API
        function syncProgress(progressData) {
            fetch('https://api.jsonbin.io/v3/b/yourjsonbinid', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(progressData)
            }).then(response => {
                if (response.ok) {
                    console.log('Progress synced successfully');
                }
            });
        }
    </script>
</body>
</html>
