<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PythonLand · Öğretmen Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F2FF;
  --surface: #FFFFFF;
  --border: #E8E5F5;
  --purple: #5B21B6;
  --purple-mid: #7C3AED;
  --purple-light: #EDE9FE;
  --purple-xlight: #F5F3FF;
  --accent: #F59E0B;
  --green: #059669;
  --green-light: #D1FAE5;
  --red: #DC2626;
  --orange: #EA580C;
  --blue: #1D4ED8;
  --text: #18181B;
  --text-2: #52525B;
  --text-3: #A1A1AA;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
  --shadow: 0 4px 16px rgba(91,33,182,0.10), 0 1px 4px rgba(0,0,0,0.04);
  --r: 14px;
  --r-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 700px 500px at 5% 5%, rgba(124,58,237,.06) 0%, transparent 70%); pointer-events:none; z-index:0; }

/* ─── HEADER ─── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.h-logo { width: 34px; height: 34px; background: linear-gradient(135deg,var(--purple-mid),var(--purple)); border-radius: 9px; display:flex; align-items:center; justify-content:center; font-size:15px; }
.h-title { font-size: .95rem; font-weight: 800; }
.h-sub   { font-size: .7rem; color: var(--text-3); font-weight: 500; margin-top:1px; }
.h-back  { margin-left: auto; font-size: .78rem; font-weight: 600; color: var(--text-3); text-decoration: none; display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); transition:all .15s; }
.h-back:hover { color:var(--purple-mid); border-color:var(--purple-mid); background:var(--purple-xlight); }

/* ─── MAIN ─── */
.main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 1; }

/* ─── SUMMARY CARDS ─── */
.summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
@media(max-width:700px){ .summary-grid { grid-template-columns: 1fr 1fr; } }

.sum-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 18px 16px; box-shadow: var(--shadow-sm); }
.sum-val   { font-size: 1.7rem; font-weight: 800; letter-spacing: -.025em; }
.sum-label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-3); margin-top: 3px; }

/* ─── FILTER BAR ─── */
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.filter-bar label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-2); }
.f-select {
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-family: 'Sora', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  color: var(--text);
  background: var(--surface);
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.f-select:focus { border-color: var(--purple-mid); }

.search-input {
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-family: 'Sora', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color .15s;
  min-width: 190px;
}
.search-input:focus { border-color: var(--purple-mid); }

.btn-refresh {
  margin-left: auto;
  background: var(--purple-mid);
  color: white;
  border: none;
  border-radius: var(--r-sm);
  padding: 8px 16px;
  font-family: 'Sora', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display:flex; align-items:center; gap:6px;
}
.btn-refresh:hover { background: var(--purple); transform:translateY(-1px); }
.btn-refresh.spinning svg { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── TABLE ─── */
.table-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow-sm); }
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead { background: var(--purple-xlight); }
.tbl th { padding: 11px 14px; text-align: left; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--purple-mid); border-bottom: 1.5px solid var(--border); white-space: nowrap; }
.tbl td { padding: 12px 14px; font-size: .83rem; font-weight: 500; border-bottom: 1px solid var(--border); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--purple-xlight); }

.student-name { font-weight: 700; }
.cls-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: .7rem;
  font-weight: 700;
}
.cls-6A { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
.cls-6B { background: #F0FDF9; color: #059669; border: 1px solid #A7F3D0; }
.cls-6C { background: #FFF7ED; color: #EA580C; border: 1px solid #FED7AA; }

/* Topic progress dots */
.topic-dots { display: flex; gap: 4px; align-items: center; }
.dot {
  width: 24px; height: 24px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem;
  font-weight: 700;
  border: 1.5px solid transparent;
  title: '';
  cursor: default;
}
.dot.done    { background: var(--green-light); color: var(--green); border-color: #6EE7B7; }
.dot.pending { background: var(--bg); color: var(--text-3); border-color: var(--border); }

/* XP pill */
.xp-pill { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg,var(--accent),#F97316); color:#fff; border-radius:20px; padding:3px 10px; font-size:.72rem; font-weight:700; }

/* Progress bar mini */
.mini-bar-wrap { width: 90px; }
.mini-bar-bg { background: var(--border); border-radius: 30px; height: 5px; overflow:hidden; }
.mini-bar-fill { height:100%; background: linear-gradient(90deg,var(--purple-mid),var(--accent)); border-radius:30px; }
.mini-pct { font-size:.68rem; font-weight:600; color:var(--text-3); margin-top:3px; }

/* Date */
.date-cell { font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--text-3); }

/* Empty state */
.empty { text-align:center; padding:60px 20px; color:var(--text-3); }
.empty p { font-size:.9rem; font-weight:500; margin-top:8px; }

/* Loading */
.loading-over { position:fixed; inset:0; background:rgba(244,242,255,.88); backdrop-filter:blur(4px); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:12px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--purple-mid); border-radius:50%; animation:spin .65s linear infinite; }
.loading-over p { font-size:.82rem; font-weight:600; color:var(--purple-mid); }

/* Toast */
.toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(70px); background:#18181B; color:#fff; border-radius:9px; padding:9px 18px; font-size:.82rem; font-weight:600; z-index:300; transition:transform .28s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.2); }
.toast.show { transform:translateX(-50%) translateY(0); }

/* Responsive */
@media(max-width:700px){
  .tbl th:nth-child(6), .tbl td:nth-child(6) { display:none; }
  .mini-bar-wrap { width:70px; }
}
</style>
</head>
<body>

<div class="loading-over" id="loading"><div class="spinner"></div><p>Veriler yükleniyor…</p></div>
<div class="toast" id="toast"></div>

<div class="header">
  <div class="h-logo">🐍</div>
  <div>
    <div class="h-title">Öğretmen Paneli</div>
    <div class="h-sub">PythonLand · Öğrenci Takip Sistemi</div>
  </div>
  <a class="h-back" href="index.html">← Platforma Dön</a>
</div>

<div class="main">

  <!-- Summary -->
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-val" id="s-total" style="color:var(--purple-mid)">—</div>
      <div class="sum-label">Toplam Öğrenci</div>
    </div>
    <div class="sum-card">
      <div class="sum-val" id="s-active" style="color:var(--green)">—</div>
      <div class="sum-label">En Az 1 Konu Bitiren</div>
    </div>
    <div class="sum-card">
      <div class="sum-val" id="s-complete" style="color:var(--accent)">—</div>
      <div class="sum-label">Tümünü Tamamlayan</div>
    </div>
    <div class="sum-card">
      <div class="sum-val" id="s-avg" style="color:var(--blue)">—</div>
      <div class="sum-label">Ort. Tamamlanan Konu</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <label>Sınıf:</label>
    <select class="f-select" id="fil-cls" onchange="applyFilter()">
      <option value="">Tümü</option>
      <option value="6-A">6-A</option>
      <option value="6-B">6-B</option>
      <option value="6-C">6-C</option>
    </select>
    <label>Durum:</label>
    <select class="f-select" id="fil-status" onchange="applyFilter()">
      <option value="">Tümü</option>
      <option value="complete">Tamamlandı (5/5)</option>
      <option value="active">Devam Ediyor</option>
      <option value="none">Başlamadı</option>
    </select>
    <input class="search-input" type="text" id="fil-search" placeholder="🔍 Öğrenci adı ara…" oninput="applyFilter()">
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
      <svg id="refresh-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Yenile
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="tbl">
      <thead>
        <tr>
          <th>#</th>
          <th>Öğrenci</th>
          <th>Sınıf</th>
          <th>İlerleme</th>
          <th>Konular</th>
          <th>XP</th>
          <th>Son Aktivite</th>
        </tr>
      </thead>
      <tbody id="tbl-body">
        <tr><td colspan="7"><div class="empty"><span style="font-size:2rem">⏳</span><p>Yükleniyor…</p></div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const BIN_ID  = '69c11805b7ec241ddc94a526';
const BIN_KEY = '$2a$10$pij9MypmyGCLZqCfSbvHguTfVK4J2de.ZI7tm/n6yUUv98qfB.PLy';
const API     = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const TOPIC_KEYS  = ['int','float','str','bool','list'];
const TOPIC_ICONS = { int:'🔢', float:'🌊', str:'📝', bool:'✅', list:'📋' };
const TOPIC_NAMES = { int:'int', float:'float', str:'str', bool:'bool', list:'list' };

let allStudents = [];
let filtered    = [];

async function loadData() {
  showLoading(true);
  document.getElementById('btn-refresh').classList.add('spinning');
  try {
    const r = await fetch(`${API}/latest`, { headers:{ 'X-Master-Key': BIN_KEY } });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    allStudents = (d.record?.students || []).sort((a,b) => {
      if (a.class < b.class) return -1;
      if (a.class > b.class) return 1;
      return a.name.localeCompare(b.name,'tr');
    });
    updateSummary();
    applyFilter();
  } catch(e) {
    showToast('Veri yüklenemedi: ' + e.message);
  }
  document.getElementById('btn-refresh').classList.remove('spinning');
  showLoading(false);
}

function updateSummary() {
  const total    = allStudents.length;
  const active   = allStudents.filter(s => Object.values(s.progress).some(Boolean)).length;
  const complete = allStudents.filter(s => Object.values(s.progress).every(Boolean)).length;
  const avgDone  = total > 0
    ? (allStudents.reduce((sum,s) => sum + Object.values(s.progress).filter(Boolean).length, 0) / total).toFixed(1)
    : '—';

  document.getElementById('s-total').textContent    = total;
  document.getElementById('s-active').textContent   = active;
  document.getElementById('s-complete').textContent = complete;
  document.getElementById('s-avg').textContent      = avgDone;
}

function applyFilter() {
  const cls    = document.getElementById('fil-cls').value;
  const status = document.getElementById('fil-status').value;
  const q      = document.getElementById('fil-search').value.toLowerCase().trim();

  filtered = allStudents.filter(s => {
    if (cls && s.class !== cls) return false;
    if (q && !s.name.toLowerCase().includes(q)) return false;
    if (status === 'complete' && !TOPIC_KEYS.every(k => s.progress[k])) return false;
    if (status === 'active') {
      const done = TOPIC_KEYS.filter(k=>s.progress[k]).length;
      if (done === 0 || done === 5) return false;
    }
    if (status === 'none' && TOPIC_KEYS.some(k=>s.progress[k])) return false;
    return true;
  });

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tbl-body');

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><span style="font-size:2rem">🔍</span><p>Eşleşen öğrenci bulunamadı.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map((s, i) => {
    const done    = TOPIC_KEYS.filter(k => s.progress[k]).length;
    const pct     = Math.round(done / TOPIC_KEYS.length * 100);
    const clsKey  = s.class.replace('-','');
    const clsCls  = `cls-${clsKey}`;

    const dots = TOPIC_KEYS.map(k =>
      `<span class="dot ${s.progress[k]?'done':'pending'}" title="${TOPIC_NAMES[k]}">${TOPIC_ICONS[k]}</span>`
    ).join('');

    const lastUp = s.lastUpdated
      ? new Date(s.lastUpdated).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
      : '—';

    return `
      <tr>
        <td style="color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600">${i+1}</td>
        <td><span class="student-name">${esc(s.name)}</span></td>
        <td><span class="cls-badge ${clsCls}">${s.class}</span></td>
        <td>
          <div class="mini-bar-wrap">
            <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
            <div class="mini-pct">${done} / 5 konu · %${pct}</div>
          </div>
        </td>
        <td><div class="topic-dots">${dots}</div></td>
        <td><span class="xp-pill">⭐ ${s.xp||0}</span></td>
        <td><span class="date-cell">${lastUp}</span></td>
      </tr>
    `;
  }).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showLoading(v){ document.getElementById('loading').style.display=v?'flex':'none'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

window.addEventListener('load', loadData);
</script>
</body>
</html>
